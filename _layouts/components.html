layout: default

{% from "macros.njk" import chevron_left %}

<section class="bg-white pt-28 pb-4 dark:bg-slate-950">
    <div class="container-page">
        <div class="flex items-center gap-2">
            <a href="/ideal-10" class="inline-flex items-center gap-1.5 rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-sm font-semibold text-slate-600 shadow-sm transition hover:bg-emerald-50 hover:border-emerald-200 hover:text-emerald-700 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-300 dark:hover:bg-slate-800">
                {{ chevron_left() }}
                Volver a IDEAL.10
            </a>
        </div>
        <h1 class="mt-4 text-4xl font-extrabold leading-none tracking-tight text-slate-900 dark:text-white md:text-5xl">
            IDEAL.10
        </h1>
    </div>
</section>

<article class="prose container-page bg-white py-8 dark:prose-invert dark:bg-slate-950 lg:prose-lg lg:py-12">
    <div class="mb-8 rounded-2xl border border-emerald-100 bg-emerald-50 p-8 dark:border-slate-800 dark:bg-slate-900 md:p-12">
        {{ content | safe }}
    </div>
